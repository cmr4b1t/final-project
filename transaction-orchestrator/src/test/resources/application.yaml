eureka:
  client:
    enabled: false

spring:
  application:
    name: transaction-orchestrator
  cloud:
    config:
      enabled: false
  data:
    mongodb:
      uri: mongodb://localhost:27017/transaction-orchestrator-test-db

kafka:
  bootstrap-servers: localhost:29092
  consumer:
    group-id: transaction-orchestrator.consumer.test

topics:
  bank-transaction-deposit-requested: bank.transaction.deposit.requested
  bank-transaction-deposit-rejected: bank.transaction.deposit.rejected
  bank-transaction-deposit-accepted: bank.transaction.deposit.accepted
  bank-transaction-withdraw-requested: bank.transaction.withdraw.requested
  bank-transaction-withdraw-accepted: bank.transaction.withdraw.accepted
  bank-transaction-withdraw-rejected: bank.transaction.withdraw.rejected
  bank-transaction-purchase-requested: bank.transaction.purchase.requested
  bank-transaction-purchase-accepted: bank.transaction.purchase.accepted
  bank-transaction-purchase-rejected: bank.transaction.purchase.rejected
