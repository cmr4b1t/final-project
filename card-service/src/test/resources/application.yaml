      uri: mongodb://localhost:27017/card-test-db

kafka:
  bootstrap-servers: localhost:29092
  consumer:
    group-id: card.consumer.test

topics:
  bank-account-created: bank.account.created
  bank-debit-card-created: bank.debit.card.created

