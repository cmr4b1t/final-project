services:
  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.13
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr"
    restart: unless-stopped
    ports:
      - "2181:2181"
    networks:
      - bootcamp-network
    healthcheck:
      test: ["CMD", "bash", "-lc", "echo ruok | nc -w 2 127.0.0.1 2181 | grep imok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.13
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"    # ahora sí lo expones al host
      - "29092:29092"  # puerto alternativo para pruebas externas
    networks:
      - bootcamp-network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL   #  obligatorio
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "bash", "-lc", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 15

  # MongoDB
  mongo-db:
    image: mongo:7
    container_name: bootcamp-mongodb
    restart: always
    ports:
      - "27017:27017"
    networks:
      - bootcamp-network
    volumes:
      - bootcamp-mongo-data:/data/db

  # Servicio de registro Eureka
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - bootcamp-network
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # config-server
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - bootcamp-network
    depends_on:
      eureka-server:
          condition: service_healthy
    environment:
      - SERVER_PORT=8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # api-gateway
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    networks:
      - bootcamp-network
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8080
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET_KEY=ABCDE-7242d1d4-a327-4ec3-af96-3eff35cc8553
      - HOSTNAME=api-gateway
      - AUTH_SERVICE_BASE_URL=http://auth-service:8181
      - CUSTOMER_SERVICE_BASE_URL=http://customer-service:8081
      - ACCOUNT_SERVICE_BASE_URL=http://account-service:8082
      - TRANSACTION_SERVICE_BASE_URL=http://transaction-service:8083
      - CARD_SERVICE_BASE_URL=http://card-service:8084
      - TRANSACTION_ORCHESTRATOR_BASE_URL=http://transaction-orchestrator:8085
      - CREDIT_CARD_ACCOUNT_SERVICE_BASE_URL=http://credit-card-account-service:8086

  # auth-service
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "8181:8181"
    networks:
      - bootcamp-network
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8181
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET_KEY=ABCDE-7242d1d4-a327-4ec3-af96-3eff35cc8553
      - HOSTNAME=auth-service

  customer-service:
    build: ./customer-service
    container_name: customer-service
    ports:
      - "8081:8081"
    networks:
      - bootcamp-network
    depends_on:
      kafka:
        condition: service_healthy
      mongo-db:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8081
      - CONFIG_SERVER_URL=http://config-server:8888
      - MONGO_URI=mongodb://bootcamp-mongodb:27017/customer-db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - HOSTNAME=customer-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CONSUMER_GROUP_ID=customer.consumer

  account-service:
    build: ./account-service
    container_name: account-service
    ports:
      - "8082:8082"
    networks:
      - bootcamp-network
    depends_on:
      kafka:
        condition: service_healthy
      mongo-db:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8082
      - CONFIG_SERVER_URL=http://config-server:8888
      - MONGO_URI=mongodb://bootcamp-mongodb:27017/account-db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - HOSTNAME=account-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CONSUMER_GROUP_ID=account.consumer
      - CLIENTS_CUSTOMER_SERVICE_BASE_URL=http://customer-service:8081
      - CLIENTS_TRANSACTION_SERVICE_BASE_URL=http://transaction-service:8083

  credit-card-account-service:
    build: ./credit-card-account-service
    container_name: credit-card-account-service
    ports:
      - "8086:8086"
    networks:
      - bootcamp-network
    depends_on:
      kafka:
        condition: service_healthy
      mongo-db:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8086
      - CONFIG_SERVER_URL=http://config-server:8888
      - MONGO_URI=mongodb://bootcamp-mongodb:27017/credit-card-account-db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - HOSTNAME=credit-card-account-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CONSUMER_GROUP_ID=credit-card-account.consumer
      - CLIENTS_CUSTOMER_SERVICE_BASE_URL=http://customer-service:8081
      - CLIENTS_TRANSACTION_SERVICE_BASE_URL=http://transaction-service:8083

  transaction-service:
    build: ./transaction-service
    container_name: transaction-service
    ports:
      - "8083:8083"
    networks:
      - bootcamp-network
    depends_on:
      kafka:
        condition: service_healthy
      mongo-db:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8083
      - CONFIG_SERVER_URL=http://config-server:8888
      - MONGO_URI=mongodb://bootcamp-mongodb:27017/transaction-db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - HOSTNAME=transaction-service

  card-service:
    build: ./card-service
    container_name: card-service
    ports:
      - "8084:8084"
    networks:
      - bootcamp-network
    depends_on:
      kafka:
        condition: service_healthy
      mongo-db:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8084
      - CONFIG_SERVER_URL=http://config-server:8888
      - MONGO_URI=mongodb://bootcamp-mongodb:27017/card-db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - HOSTNAME=card-service
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CONSUMER_GROUP_ID=card.consumer

  transaction-orchestrator:
    build: ./transaction-orchestrator
    container_name: transaction-orchestrator
    ports:
      - "8085:8085"
    networks:
      - bootcamp-network
    depends_on:
      kafka:
        condition: service_healthy
      mongo-db:
        condition: service_started
      config-server:
        condition: service_healthy
    environment:
      - SERVER_PORT=8085
      - CONFIG_SERVER_URL=http://config-server:8888
      - MONGO_URI=mongodb://bootcamp-mongodb:27017/transaction-orchestrator-db
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - HOSTNAME=transaction-orchestrator
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CONSUMER_GROUP_ID=transaction-orchestrator.consumer

networks:
  bootcamp-network:
    driver: bridge
    name: bootcamp-network

volumes:
  bootcamp-mongo-data:
    name: bootcamp-mongo-data