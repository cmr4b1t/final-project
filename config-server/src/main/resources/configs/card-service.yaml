spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/card-db}
      auto-index-creation: true

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP_ID:card.consumer}

topics:
  bank-account-created: bank.account.created
  bank-debit-card-created: bank.debit-card.created
  bank-credit-card-account-created: bank.credit-card-account.created
  bank-credit-card-created: bank.credit-card.created

management:
  endpoints:
    web:
      exposure:
        include: health,info
