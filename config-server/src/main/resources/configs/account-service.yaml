spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/account-db}

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

topics:
  bank-account-created: bank.account.created

management:
  endpoints:
    web:
      exposure:
        include: health,info

clients:
  customer-service:
    base-url: ${CLIENTS_CUSTOMER_SERVICE_BASE_URL:http://localhost:8081}