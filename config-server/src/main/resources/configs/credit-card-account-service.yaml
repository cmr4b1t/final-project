spring:
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/credit-card-account-db}
      auto-index-creation: true

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP_ID:credit-card-account.consumer}

topics:
  bank-credit-card-account-created: bank.credit-card-account.created
  bank-credit-card-created: bank.credit-card.created
  bank-credit-card-account-activated: bank.credit-card-account.activated

management:
  endpoints:
    web:
      exposure:
        include: health,info

clients:
  customer-service:
    base-url: ${CLIENTS_CUSTOMER_SERVICE_BASE_URL:http://localhost:8081}
  transaction-service:
    base-url: ${CLIENTS_TRANSACTION_SERVICE_BASE_URL:http://localhost:8083}

resilience4j:
  circuitbreaker:
    instances:
      transactionClient:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      customerClient:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  retry:
    instances:
      transactionClient:
        maxAttempts: 3
        waitDuration: 200ms
      customerClient:
        maxAttempts: 3
        waitDuration: 200ms
  timelimiter:
    instances:
      transactionClient:
        timeoutDuration: 2s
      customerClient:
        maxAttempts: 3
        waitDuration: 200ms