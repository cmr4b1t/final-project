openapi: 3.0.3
info:
  title: Customers API
  version: v1.0.0
  description: 'API para gestionar clientes'
servers:
  - url: http://localhost:8081
    description: Local
paths:
  /v1/customers:
    post:
      tags:
        - Customers
      summary: Register a new customer
      description: Creates an active customer using the provided identity document data.
      operationId: createCustomer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequestDto'
        required: true
      responses:
        '201':
          description: Customer created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CustomerResponseDto'
        '400':
          description: Invalid request body
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Customer already exists
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    get:
      tags:
        - Customers
      summary: List customers
      description: Returns all registered customers.
      operationId: findAll
      responses:
        '200':
          description: Customers returned
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerResponseDto'
  /v1/customers/{customerId}:
    get:
      tags:
        - Customers
      summary: Find customer by ID
      description: Returns a customer using its business identifier.
      operationId: findByCustomerId
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Customer found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CustomerResponseDto'
        '400':
          description: Invalid customer identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Customer not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      tags:
        - Customers
      summary: Update customer
      description: Updates the mutable data of an existing customer.
      operationId: update
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequestDto'
        required: true
      responses:
        '200':
          description: Customer updated
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CustomerResponseDto'
        '400':
          description: Invalid request body or customer identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Customer not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Customer document number already exists
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      tags:
        - Customers
      summary: Delete customer
      description: Deletes an existing customer by its business identifier.
      operationId: delete
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '204':
          description: Customer deleted
        '400':
          description: Invalid customer identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Customer not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  schemas:
    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          format: int32
        error:
          type: string
        message:
          type: string
        path:
          type: string
    UpdateCustomerRequestDto:
      type: object
      properties:
        documentNumber:
          type: string
        fullName:
          type: string
        type:
          type: string
          enum:
            - PERSONAL
            - BUSINESS
        profile:
          type: string
          enum:
            - STANDARD
            - VIP
            - PYME
        hasOverdueDebts:
          type: boolean
          example: false
    CustomerResponseDto:
      type: object
      properties:
        customerId:
          type: string
        documentNumber:
          type: string
        fullName:
          type: string
        type:
          type: string
          enum:
            - PERSONAL
            - BUSINESS
        profile:
          type: string
          enum:
            - STANDARD
            - VIP
            - PYME
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        hasOverdueDebts:
          type: boolean
        savingsAccountsCount:
          type: integer
          format: int32
        checkingAccountsCount:
          type: integer
          format: int32
        fixedTermAccountsCount:
          type: integer
          format: int32
        creditCardsCount:
          type: integer
          format: int32
        loansCount:
          type: integer
          format: int32
    CreateCustomerRequestDto:
      type: object
      properties:
        documentNumber:
          type: string
          minLength: 1
        fullName:
          type: string
          minLength: 1
        type:
          type: string
          enum:
            - PERSONAL
            - BUSINESS
        profile:
          type: string
          enum:
            - STANDARD
            - VIP
            - PYME
      required:
        - documentNumber
        - fullName
        - profile
        - type
