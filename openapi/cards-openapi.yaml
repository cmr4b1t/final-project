openapi: 3.0.3
info:
  title: Cards API
  version: v1.0.0
  description: 'Cards Management'
servers:
  - url: http://localhost:8084
    description: Local
paths:
  /v1/cards/debit:
    post:
      tags:
        - Cards
      summary: Create debit card
      description: Creates an active debit card for a customer.
      operationId: createDebit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardRequestDto'
        required: true
      responses:
        '201':
          description: Debit card created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponseDto'
        '400':
          description: Invalid request body
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    get:
      tags:
        - Cards
      summary: List debit cards
      description: Returns all debit cards.
      operationId: findAllDebits
      responses:
        '200':
          description: Debit cards returned
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponseDto'
  /v1/cards/debit/{cardId}:
    get:
      tags:
        - Cards
      summary: Find debit card by ID
      description: Returns a debit card using its business identifier.
      operationId: findDebitByCardId
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Debit card found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponseDto'
        '400':
          description: Invalid card identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Debit card not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      tags:
        - Cards
      summary: Update debit card
      description: Updates mutable data of an existing debit card.
      operationId: updateDebit
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCardRequestDto'
        required: true
      responses:
        '200':
          description: Debit card updated
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponseDto'
        '400':
          description: Invalid request body or card identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Debit card not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      tags:
        - Cards
      summary: Delete debit card
      description: Deletes an existing debit card.
      operationId: deleteDebit
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Debit card deleted
          content:
            '*/*':
              schema:
                type: string
        '400':
          description: Invalid card identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Debit card not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /v1/cards/credit:
    post:
      tags:
        - Cards
      summary: Create credit card
      description: Creates an active credit card for a customer.
      operationId: createCredit
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCardRequestDto'
        required: true
      responses:
        '201':
          description: Credit card created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponseDto'
        '400':
          description: Invalid request body
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    get:
      tags:
        - Cards
      summary: List credit cards
      description: Returns all credit cards.
      operationId: findAllCredits
      responses:
        '200':
          description: Credit cards returned
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponseDto'
  /v1/cards/credit/{cardId}:
    get:
      tags:
        - Cards
      summary: Find credit card by ID
      description: Returns a credit card using its business identifier.
      operationId: findCreditByCardId
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Credit card found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponseDto'
        '400':
          description: Invalid card identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Credit card not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    put:
      tags:
        - Cards
      summary: Update credit card
      description: Updates mutable data of an existing credit card.
      operationId: updateCredit
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCardRequestDto'
        required: true
      responses:
        '200':
          description: Credit card updated
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CardResponseDto'
        '400':
          description: Invalid request body or card identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Credit card not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
    delete:
      tags:
        - Cards
      summary: Delete credit card
      description: Deletes an existing credit card.
      operationId: deleteCredit
      parameters:
        - name: cardId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Credit card deleted
          content:
            '*/*':
              schema:
                type: string
        '400':
          description: Invalid card identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Credit card not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /v1/cards/customers/{customerId}:
    get:
      tags:
        - Cards
      summary: List customer cards
      description: Returns all debit and credit cards for a customer.
      operationId: findAllCardsByCustomerId
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Customer cards returned
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CardResponseDto'
        '400':
          description: Invalid customer identifier
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  schemas:
    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          format: int32
        error:
          type: string
        message:
          type: string
        path:
          type: string
    UpdateCardRequestDto:
      type: object
      properties:
        customerId:
          type: string
        sourceAccountId:
          type: string
        cardStatus:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - BLOCKED
    CardResponseDto:
      type: object
      properties:
        cardId:
          type: string
        customerId:
          type: string
        sourceAccountId:
          type: string
        cardType:
          type: string
          enum:
            - CREDIT
            - DEBIT
        cardNumber:
          type: string
        cardStatus:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - BLOCKED
    CreateCardRequestDto:
      type: object
      properties:
        customerId:
          type: string
          minLength: 1
        sourceAccountId:
          type: string
          minLength: 1
      required:
        - customerId
        - sourceAccountId
